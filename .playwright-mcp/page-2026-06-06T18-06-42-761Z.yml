      - generic [ref=e176]:
        - heading "9. Cookie Policy" [level=2] [ref=e177]
        - paragraph [ref=e178]: Il Sito utilizza cookie — piccole porzioni di dati memorizzate sul tuo dispositivo — per migliorare la tua esperienza di navigazione e fornire determinate funzionalità.
        - heading "9.1 Cookie Tecnici (necessari)" [level=3] [ref=e179]
        - paragraph [ref=e180]: Sono essenziali per il funzionamento del Sito e non richiedono il tuo consenso. Senza questi cookie, alcune funzionalità del Sito potrebbero non funzionare correttamente.
        - list [ref=e181]:
          - listitem [ref=e182]:
            - strong [ref=e183]: "Cookie di preferenza tema:"
            - text: "memorizzano la tua scelta tra modalità chiara e scura (durata: sessione)."
          - listitem [ref=e184]:
            - strong [ref=e185]: "Cookie di consenso cookie banner:"
            - text: "registrano la tua accettazione o rifiuto della presente informativa sui cookie (durata: 12 mesi)."
        - heading "9.2 Cookie di Terze Parti" [level=3] [ref=e186]
        - paragraph [ref=e187]: "Il Sito può contenere servizi forniti da soggetti terzi che installano cookie sul tuo dispositivo:"
        - list [ref=e188]:
          - listitem [ref=e189]:
            - strong [ref=e190]: "Google Fonts:"
            - text: "utilizzato per il rendering dei caratteri tipografici. I font sono caricati direttamente dai server di Google (googleapis.com). Per i dettagli, consulta la privacy policy di Google:"
            - link "https://policies.google.com/privacy" [ref=e191] [cursor=pointer]:
              - /url: https://policies.google.com/privacy
            - text: .
          - listitem [ref=e192]:
            - strong [ref=e193]: "Google Maps:"
            - text: "utilizzato per visualizzare la mappa della sede aziendale. L'uso di Google Maps può comportare il trattamento di dati di navigazione (indirizzo IP). Per i dettagli, consulta:"
            - link "https://policies.google.com/privacy" [ref=e194] [cursor=pointer]:
              - /url: https://policies.google.com/privacy
            - text: .
          - listitem [ref=e195]:
            - strong [ref=e196]: "Servizi analitici:"
            - text: su tuo esplicito consenso, potrebbero essere attivati servizi di analisi statistica della navigazione del Sito (es. Google Analytics). Tali cookie sono configurati in modalità anonimizzata e non permettono l'identificazione diretta dell'utente.
        - heading "9.3 Come Gestire i Cookie" [level=3] [ref=e197]
        - paragraph [ref=e198]: "Puoi gestire le tue preferenze sui cookie in due modi:"
        - list [ref=e199]:
          - listitem [ref=e200]:
            - strong [ref=e201]: "Banner dei cookie:"
            - text: al primo accesso al Sito, un banner ti chiede di accettare o rifiutare i cookie non essenziali. Puoi modificare la tua scelta in qualsiasi momento.
          - listitem [ref=e202]:
            - strong [ref=e203]: "Impostazioni del browser:"
            - text: "puoi configurare il tuo browser per bloccare o eliminare i cookie. Le istruzioni si trovano nelle pagine di aiuto dei principali browser: Chrome, Firefox, Safari, Edge."
        - paragraph [ref=e204]:
          - strong [ref=e205]: "Nota importante:"
          - text: il rifiuto dei cookie non essenziali non impedisce la navigazione sul Sito, ma potrebbe limitare alcune funzionalità (es. la persistenza della scelta del tema scuro/chiaro).
