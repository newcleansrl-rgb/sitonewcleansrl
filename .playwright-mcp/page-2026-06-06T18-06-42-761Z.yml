        - paragraph [ref=e128]: I Responsabili del trattamento sono selezionati in conformità al GDPR (Art. 28) e trattati nel rispetto delle istruzioni del Titolare.
      - generic [ref=e129]:
        - heading "6. Trasferimento dei Dati Fuori dall'Unione Europea" [level=2] [ref=e130]
        - paragraph [ref=e131]:
          - text: I tuoi dati personali
          - strong [ref=e132]: non sono trasferiti al di fuori dell'Unione Europea
