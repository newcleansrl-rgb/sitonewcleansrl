      - generic [ref=e105]:
        - heading "4. Modalità del Trattamento e Sicurezza" [level=2] [ref=e106]
        - paragraph [ref=e107]: I tuoi dati personali sono trattati con modalità automatizzate e, ove necessario, manuali, presso la sede del Titolare e in altri luoghi dove le sedi delle unità organizzative delegate al trattamento si trovano.
        - paragraph [ref=e108]: "Sono adottate adeguate misure di sicurezza tecniche e organizzative per proteggere i tuoi dati da perdita, uso illecito o non corretto e accesso non autorizzato. Le misure includono:"
        - list [ref=e109]:
          - listitem [ref=e110]: Crittografia HTTPS (SSL/TLS) per la trasmissione dei dati tramite il Sito.
          - listitem [ref=e111]: Accessi controllati e registrati ai sistemi che trattano i dati.
          - listitem [ref=e112]: Backup regolari dei dati.
          - listitem [ref=e113]: Formazione del personale sulle tematiche della privacy e protezione dei dati.
