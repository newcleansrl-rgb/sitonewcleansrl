      - generic [ref=e133]:
        - heading "7. Criteri di Conservazione dei Dati" [level=2] [ref=e134]
        - paragraph [ref=e135]: "I tuoi dati personali sono conservati per il tempo strettamente necessario al perseguimento delle finalità per le quali sono stati raccolti, secondo i seguenti criteri:"
        - list [ref=e136]:
          - listitem [ref=e137]:
            - strong [ref=e138]: "Dati del form di contatto (richieste/preventivi):"
            - text: 12 mesi dalla data dell'ultima comunicazione con l'utente.
          - listitem [ref=e139]:
            - strong [ref=e140]: "Dati contrattuali e fiscali:"
            - text: il periodo previsto dagli obblighi di legge (generalmente 10 anni per documenti contabili).
          - listitem [ref=e141]:
            - strong [ref=e142]: "Dati di navigazione e log del server:"
            - text: massimo 7 giorni, in forma aggregata.
          - listitem [ref=e143]:
            - strong [ref=e144]: "Cookie tecnici:"
            - text: fino alla scadenza del termine di validità o alla disattivazione da parte dell'utente.
          - listitem [ref=e145]:
            - strong [ref=e146]: "Cookie analitici (con consenso):"
            - text: fino alla scadenza del termine di validità o alla revoca del consenso.
        - paragraph [ref=e147]: Al termine dei suddetti termini, i dati saranno cancellati o resi anonimizzati in modo irreversibile.
      - generic [ref=e148]:
        - heading "8. Diritti dell'Interessato" [level=2] [ref=e149]
        - paragraph [ref=e150]: "Ai sensi degli Artt. 15-22 del GDPR, hai il diritto di esercitare i seguenti diritti nei confronti del Titolare:"
        - list [ref=e151]:
          - listitem [ref=e152]:
            - strong [ref=e153]: "Diritto di accesso (Art. 15):"
            - text: ottenere la conferma dell'esistenza dei tuoi dati personali e riceverne una copia, nonché informazioni sulle finalità del trattamento, le categorie di dati, i destinatari e il periodo di conservazione.
          - listitem [ref=e154]:
            - strong [ref=e155]: "Diritto di rettifica (Art. 16):"
            - text: richiedere la correzione di dati inesatti o l'integrazione di dati incompleti.
          - listitem [ref=e156]:
            - strong [ref=e157]: "Diritto alla cancellazione (\"diritto all'oblio\") (Art. 17):"
            - text: richiedere la cancellazione dei tuoi dati quando non sono più necessari rispetto alle finalità per cui sono stati raccolti, oppure quando revochi il consenso (ove il trattamento si basa sul consenso).
          - listitem [ref=e158]:
            - strong [ref=e159]: "Diritto alla limitazione del trattamento (Art. 18):"
            - text: richiedere la limitazione del trattamento nei casi previsti dall'Art. 18 GDPR.
          - listitem [ref=e160]:
            - strong [ref=e161]: "Diritto alla portabilità dei dati (Art. 20):"
            - text: ricevere i tuoi dati in un formato strutturato, di uso comune e leggibile da dispositivo automatico, e richiederne il trasferimento a un altro titolare.
          - listitem [ref=e162]:
            - strong [ref=e163]: "Diritto di opposizione (Art. 21):"
            - text: opporsi al trattamento dei tuoi dati quando si basa sul legittimo interesse del Titolare, inclusi i profili di marketing diretto.
          - listitem [ref=e164]:
            - strong [ref=e165]: "Diritto di revoca del consenso:"
            - text: ove il trattamento si basi sul tuo consenso, hai il diritto di revocarlo in qualsiasi momento, senza che la revoca incida sulla liceità del trattamento basato sul consenso previo.
        - paragraph [ref=e166]: "Per esercitare i tuoi diritti, puoi inviare una richiesta all'indirizzo email:"
